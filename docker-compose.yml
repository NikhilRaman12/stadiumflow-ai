# ── Docker Compose — StadiumIQ Production ─────────────────────────
# Usage:
#   docker-compose up -d
#   Open: http://localhost/fan  or  http://localhost/ops
# ──────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── Backend: FastAPI + all AI agents ──────────────────────────
  backend:
    image: nikhilraman12/stadiumiq:latest
    container_name: stadiumiq-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - PORT=8000
      - HOST=0.0.0.0
      - DEBUG=false
      - LOG_LEVEL=INFO
      - PYTHONIOENCODING=utf-8
      - ALLOWED_ORIGINS=*
    volumes:
      - stadiumiq_db:/app/db
      - stadiumiq_index:/app/graph_rag/index
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Nginx: Reverse proxy + static frontend ─────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: stadiumiq-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  stadiumiq_db:
  stadiumiq_index:
