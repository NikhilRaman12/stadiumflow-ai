name: CI Gates

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-asyncio pytest-cov ruff bandit pip-audit

    - name: Run Ruff Linting
      run: ruff check backend/

    - name: Run Bandit Security Audit
      run: bandit -r backend/ -ll -ii

    - name: Run Pip-Audit Dependency Check
      run: pip-audit || true # allow failures for audit if environment varies, but log it

    - name: Run Pytest with Coverage
      env:
        PYTHONPATH: backend
        GEMINI_API_KEY: "" # run in simulation/fallback mode
      run: |
        pytest backend/ --cov=backend --cov-fail-under=90 --cov-report=term-missing

    - name: Verify Docker Build
      run: docker build -t nikhilraman12/stadiumiq:latest .
