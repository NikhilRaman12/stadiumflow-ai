server {
    listen 80;
    server_name _;

    # Fan App — root redirect
    location = / {
        return 302 /fan;
    }

    # Fan App
    location /fan {
        proxy_pass         http://backend:8000/fan;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Ops Dashboard
    location /ops {
        proxy_pass         http://backend:8000/ops;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # API
    location /api {
        proxy_pass         http://backend:8000/api;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # A2A
    location /a2a {
        proxy_pass         http://backend:8000/a2a;
        proxy_set_header   Host $host;
    }

    # Static assets
    location /css {
        proxy_pass http://backend:8000/css;
    }
    location /js {
        proxy_pass http://backend:8000/js;
    }
    location /assets {
        proxy_pass http://backend:8000/assets;
    }

    # WebSocket
    location /ws {
        proxy_pass         http://backend:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }
}
